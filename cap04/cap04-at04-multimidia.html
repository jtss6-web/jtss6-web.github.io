<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recursos Multimídia - Cap. 4 Ativ. 4</title>
    <link rel="stylesheet" href="../estilo.css"> </head>
<body>

<main>
    <header>
        <h1>Recursos Multimídia</h1>
    </header>

    <figure>
        <video controls width="800" height="450" poster="../img/poster-aula.jpg" preload="metadata">
            <source src="../media/aula.mp4" type="video/mp4">
            <source src="../media/aula.webm" type="video/webm">
            <track kind="subtitles" src="../legendas/aula-html.vtt" srclang="pt" label="Português" default>
            <p>Seu navegador não suporta vídeo. <a href="../media/aula.mp4">Baixe o vídeo aqui</a>.</p>
        </video>
        <figcaption>Vídeo demonstrativo sobre HTML5.</figcaption>
    </figure>

    <figure>
        <audio controls preload="metadata">
            <source src="../media/podcast.mp3" type="audio/mpeg">
            <source src="../media/podcast.ogg" type="audio/ogg">
            <p>Seu navegador não suporta áudio. <a href="../media/podcast.mp3">Baixe o áudio aqui</a>.</p>
        </audio>
        <figcaption>Podcast: Introdução ao Desenvolvimento Web.</figcaption>
    </figure>

    <figure>
        <iframe 
    width="800" 
    height="450" 
    src="https://www.youtube-nocookie.com/embed/Ejkb_YpuHWs?si=hiIpzpD9-3VfZzk3" 
    title="Descrição do vídeo" 
    loading="lazy" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
</iframe>
        <figcaption>Vídeo incorporado do YouTube.</figcaption>
    </figure>

    <figure>
        <picture>
            <source media="(min-width: 768px)" srcset="../img/banner-wide.jpg">
            <img src="../img/banner-mobile.jpg" alt="Banner tecnologias web" width="800" height="300">
        </picture>
        <figcaption>Imagem responsiva.</figcaption>
    </figure>

   <footer style="color: #ffffff;">

</footer>
</main>

</html>
