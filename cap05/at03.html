<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 AT03: Matrícula Acadêmica</title>
    
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: Arial, sans-serif; padding: 20px; }
        form { background-color: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; max-width: 600px; margin: 20px auto; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background-color: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        fieldset { border: 1px solid #444; padding: 15px; margin-top: 20px; border-radius: 5px; }
        legend { color: #3498db; font-weight: bold; padding: 0 10px; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { color: #ffffff !important; }
    </style>
</head>
<body>

    <header>
        <h1>Solicitação de Matrícula</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>

    <main>
        <p>* Campos obrigatórios</p>
        
        <form action="https://httpbin.org/post" method="POST">
            
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="nome">Nome completo: *</label>
                <input type="text" id="nome" name="nome" required minlength="5" maxlength="100" aria-required="true">

                <label for="cpf">CPF: *</label>
                <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00" aria-required="true">

                <label for="telefone">Telefone: *</label>
                <input type="tel" id="telefone" name="telefone" required pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999" aria-required="true">

                <label for="email">E-mail: *</label>
                <input type="email" id="email" name="email" required aria-required="true">
            </fieldset>

            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <label for="curso">Curso: *</label>
                <select id="curso" name="curso" required aria-required="true">
                    <option value="">Selecione um curso</option>
                    <optgroup label="Computação">
                        <option value="si">Sistemas de Informação</option>
                        <option value="cc">Ciência da Computação</option>
                        <option value="ec">Engenharia da Computação</option>
                    </optgroup>
                    <optgroup label="Gestão">
                        <option value="adm">Administração</option>
                        <option value="cont">Ciências Contábeis</option>
                    </optgroup>
                </select>

                <fieldset>
                    <legend>Período:</legend>
                    <input type="radio" id="manha" name="periodo" value="manha" required><label for="manha">Manhã</label>
                    <input type="radio" id="tarde" name="periodo" value="tarde" required><label for="tarde">Tarde</label>
                    <input type="radio" id="noite" name="periodo" value="noite" required><label for="noite">Noite</label>
                </fieldset>

                <label for="ano_ingresso">Ano de ingresso pretendido: *</label>
                <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required aria-required="true">
            </fieldset>

            <fieldset>
                <legend>Áreas de Interesse</legend>
                <input type="checkbox" id="web" name="interesses[]" value="web"><label for="web">Desenvolvimento Web</label>
                <input type="checkbox" id="bd" name="interesses[]" value="bd"><label for="bd">Banco de Dados</label>
                <input type="checkbox" id="ia" name="interesses[]" value="ia"><label for="ia">Inteligência Artificial</label>
                <input type="checkbox" id="seg" name="interesses[]" value="seg"><label for="seg">Segurança</label>
                <input type="checkbox" id="infra" name="interesses[]" value="infra"><label for="infra">Infraestrutura</label>
            </fieldset>

            <button type="submit">Solicitar matrícula</button>
            <button type="reset">Limpar formulário</button>
        </form>
    </main>

</body>
</html>
