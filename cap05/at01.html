<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 AT01: Formulário de Contato</title>
    
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: Arial, sans-serif; padding: 20px; }
        form { background-color: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; max-width: 600px; margin: 20px auto; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background-color: #2b2b2b; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { color: #ffffff !important; }
    </style>
</head>
<body>

    <header>
        <h1>Formulário de Contato</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>

    <main>
        <p>* Campos obrigatórios</p>
        
        <form action="https://httpbin.org/get" method="GET">
            
            <div>
                <label for="nome">Nome completo: *</label>
                <input type="text" id="nome" name="nome" aria-required="true" required>
            </div>

            <div>
                <label for="email">E-mail: *</label>
                <input type="email" id="email" name="email" aria-required="true" required>
            </div>

            <div>
                <label for="assunto">Assunto: *</label>
                <input type="text" id="assunto" name="assunto" aria-required="true" required>
            </div>

            <div>
                <label for="mensagem">Mensagem: *</label>
                <textarea id="mensagem" name="mensagem" rows="5" aria-required="true" required></textarea>
            </div>

            <button type="submit">Enviar mensagem</button>
        </form>
    </main>

</body>
</html>
