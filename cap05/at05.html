<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWEB1 - Cap. 05 AT05: Pesquisa Acadêmica</title>
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: Arial, sans-serif; padding: 20px; }
        form { background-color: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; max-width: 650px; margin: 20px auto; }
        fieldset { border: 1px solid #444; padding: 15px; margin-top: 20px; }
        legend { color: #3498db; font-weight: bold; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; background-color: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px; background-color: #3498db; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Pesquisa de Perfil Acadêmico</h1>
        <p><a href="../index.html">← Voltar para a página principal</a></p>
    </header>

    <main>
        <p>* Campos obrigatórios</p>
        
        <form action="https://httpbin.org/post" method="POST" novalidate>
            <input type="hidden" name="pesquisa_id" value="PWEB1-2026-1">

            <fieldset>
                <legend>Perfil do estudante</legend>
                <label for="nome">Nome completo: *</label>
                <input type="text" id="nome" name="nome" required aria-required="true" autocomplete="name">
                
                <label for="matricula">Matrícula (7 dígitos): *</label>
                <input type="text" id="matricula" name="matricula" pattern="\d{7}" required aria-required="true">
                
                <label for="email">E-mail institucional: *</label>
                <input type="email" id="email" name="email" aria-required="true" aria-invalid="false" aria-describedby="erro-email" onblur="validarEmail(this)" autocomplete="email">
                <p id="erro-email" role="alert" style="color: #ff6b6b;"></p>

                <label>Turno: *</label>
                <input type="radio" name="turno" value="manha" id="manha" required><label for="manha">Manhã</label>
                <input type="radio" name="turno" value="tarde" id="tarde"><label for="tarde">Tarde</label>
                <input type="radio" name="turno" value="noite" id="noite"><label for="noite">Noite</label>
            </fieldset>

            <fieldset>
                <legend>Perfil tecnológico</legend>
                <label>Tecnologias que conhece:</label>
                <input type="checkbox" name="tech[]" value="html"> HTML <input type="checkbox" name="tech[]" value="css"> CSS ... (adicione até 8)
                
                <label for="exp">Anos de experiência:</label>
                <input type="number" name="experiencia" min="0" max="30">
            </fieldset>

            <fieldset>
                <legend>Avaliação da disciplina</legend>
                <label for="nota">Nota (0-10):</label>
                <input type="range" id="nota" name="nota" min="0" max="10" oninput="document.getElementById('valNota').textContent = this.value">
                <span id="valNota">5</span>
                
                <label for="data_preenchimento">Data: *</label>
                <input type="date" id="data_preenchimento" name="data_preenchimento" required>
            </fieldset>

            <fieldset>
                <legend>Consentimento</legend>
                <input type="checkbox" name="consentimento" required> <label>Autorizo o uso dos dados.</label>
            </fieldset>

            <button type="submit">Enviar pesquisa</button>
        </form>
    </main>

    <script>
        // Validação E-mail
        function validarEmail(campo) {
            const erro = document.getElementById('erro-email');
            if (!campo.value.endsWith('@ifal.edu.br')) {
                erro.textContent = 'Informe seu e-mail institucional (@ifal.edu.br)';
                campo.setAttribute('aria-invalid', 'true');
            } else {
                erro.textContent = '';
                campo.setAttribute('aria-invalid', 'false');
            }
        }
        // Data dinâmica
        document.getElementById('data_preenchimento').max = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
